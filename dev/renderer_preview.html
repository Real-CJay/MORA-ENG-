<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mora Quiz Renderer Preview</title>
  <link rel="stylesheet" href="../vendor/katex/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="./renderer_preview.css">
</head>
<body>
  <main class="preview-shell">
    <header class="preview-header">
      <div>
        <p class="preview-kicker">Standalone development preview</p>
        <h1>Mora Quiz Question Renderer</h1>
      </div>
      <p id="preview-status" class="preview-status">Loading examples/renderer_preview_fixtures.json...</p>
    </header>

    <section class="preview-note">
      <p>This page imports the Stage 3 renderer and legacy adapter only. It is not wired into the live app.</p>
    </section>

    <section id="preview-list" class="preview-list" aria-live="polite"></section>
  </main>

  <script src="../vendor/katex/katex.min.js"></script>
  <script src="../vendor/katex/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script type="module">
    import { normalizePack } from '../js/legacy_adapter.js';
    import { renderQuestion } from '../js/question_renderer.js';

    const status = document.getElementById('preview-status');
    const list = document.getElementById('preview-list');
    const previewSource = '../examples/renderer_preview_fixtures.json';

    function fixtureInfo(pack, question) {
      return question.id ? pack.previewFixtures?.[question.id] || null : null;
    }

    function questionLabel(question, index, fixture) {
      const fixtureName = fixture?.label || question.type || 'Question';
      return `Fixture ${index + 1}: ${fixtureName}`;
    }

    function appendFixtureMeta(wrapper, question, fixture) {
      const meta = document.createElement('div');
      meta.className = 'preview-fixture-meta';

      const details = document.createElement('p');
      details.className = 'preview-fixture-id';
      details.textContent = `${question.id || 'missing id'} - ${question.type || 'legacy/adapted'}`;
      meta.appendChild(details);

      if (fixture?.expected) {
        const expected = document.createElement('p');
        expected.className = 'preview-fixture-expected';
        expected.textContent = `Expected: ${fixture.expected}`;
        meta.appendChild(expected);
      }

      wrapper.appendChild(meta);
    }

    async function loadPreview() {
      try {
        const response = await fetch(previewSource, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const pack = normalizePack(await response.json());

        status.textContent = `Loaded ${pack.questions.length} preview fixtures from examples/renderer_preview_fixtures.json.`;
        list.replaceChildren();

        pack.questions.forEach((question, index) => {
          const fixture = fixtureInfo(pack, question);
          const wrapper = document.createElement('section');
          wrapper.className = 'preview-card';
          if (question.id) wrapper.dataset.fixtureId = question.id;

          const title = document.createElement('h2');
          title.textContent = questionLabel(question, index, fixture);
          wrapper.appendChild(title);
          appendFixtureMeta(wrapper, question, fixture);

          const mount = document.createElement('div');
          wrapper.appendChild(mount);
          list.appendChild(wrapper);

          renderQuestion(mount, question, pack, { questionNumber: index + 1 });
        });
      } catch (error) {
        status.textContent = 'Failed to load examples/renderer_preview_fixtures.json.';
        const message = document.createElement('pre');
        message.className = 'preview-error';
        message.textContent = String(error && error.message ? error.message : error);
        list.replaceChildren(message);
      }
    }

    loadPreview();
  </script>
</body>
</html>
